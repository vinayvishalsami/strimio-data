name: Update Movies Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  scrape-movies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ✅ ONLY run the movies scraper
      - name: Run Movies scraper (isolated)
        run: |
          python scrapers/movies_desicinemas.py

      # ✅ Only commit if movies-related files changed
      - name: Commit & push movie data only
        run: |
          git config user.name "strimio-bot"
          git config user.email "bot@strimio.app"

          git status

          if git status --porcelain | grep -E "^( M|A ) (site/movies/|movies/|movie/)"; then
            git add site/movies movies movie
            git commit -m "Update Bollywood movies data"
            git push
          else
            echo "No movie data changes to commit"
          fi
