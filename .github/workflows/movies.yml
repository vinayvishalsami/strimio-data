name: Update Movies Dataname ✅ Manual runs must explicitly opt-in
  workflow_dispatch:
    inputs:
      run_movies:
        description: "Run Movies pipeline only"
        required: true
        default: false
        type: boolean

  # ✅ Scheduled daily run (safe, isolated)
  schedule:
    - cron: "0 12 * * *"

jobs:
  scrape-movies:
    # ✅ Allow scheduled runs OR manually approved movie runs
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_movies == 'true')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Movies scraper
        run: |
          python movies_desicinemas.py

      - name: Commit & push movie data only
        run: |
          git config user.name "strimio-bot"
          git config user.email "bot@strimio.app"

          if git status --porcelain | grep -E "^( M|A ) (site/movies/|movies/|movie/)"; then
            git add site/movies movies movie
            git commit -m "Update Bollywood movies data"
            git push
          else
            echo "No movie data changes to commit"
          fi

on:
