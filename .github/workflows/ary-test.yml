name: ARY Digital Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # once daily (official content)

jobs:
  arydigital:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run ARY pipeline
        run: python pipeline_ary_test.py

      - name: Commit ARY data only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add site/arydigital channel/ary_* series episode sites.json
          git commit -m "Update ARY Digital catalog" || echo "No changes"
          git push
