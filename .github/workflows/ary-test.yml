name: ARY Digital – Limited Test Scrape

on:
  workflow_dispatch:   # manual trigger only
  schedule:
    - cron: "0 3 * * *"   # OPTIONAL: once daily (remove if you want)

jobs:
  ary-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run ARY test pipeline
        run: python pipeline_ary_test.py

      - name: Commit results (ARY only)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add site/arydigital channel/ary_* series episode sites.json
          git commit -m "ARY Digital test scrape (limited)" || echo "Nothing to commit"
          git push
