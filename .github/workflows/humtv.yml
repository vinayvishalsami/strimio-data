name: HUM TV Scraper (isolated)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

permissions:
  contents: write

concurrency:
  group: scrape-all
  cancel-in-progress: false

jobs:
  humtv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run HUM TV ONLY
        run: |
          python pipeline_publish.py
        env:
          RUN_YODESI: "0"
          RUN_PLAYDESI: "0"
          RUN_HUMTV: "1"
